name: Deploy AKS Copilot to AKS

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to latest)"
        default: latest

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  NAMESPACE: aks-copilot

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Apply namespace, RBAC, config
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/rbac.yaml
          kubectl apply -f k8s/configmap.yaml

      - name: Create/update secrets
        run: |
          kubectl create secret generic aks-copilot-secrets \
            --namespace "${{ env.NAMESPACE }}" \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_SEARCH_ENDPOINT="${{ secrets.AZURE_SEARCH_ENDPOINT }}" \
            --from-literal=AZURE_SEARCH_API_KEY="${{ secrets.AZURE_SEARCH_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set image tags
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.event.workflow_run.head_sha || 'latest' }}
        run: |
          sed -i "s#ghcr.io/ramamishra7262/aks-copilot-backend:.*#ghcr.io/ramamishra7262/aks-copilot-backend:${IMAGE_TAG}#" k8s/deployment.yaml
          sed -i "s#ghcr.io/ramamishra7262/aks-copilot-frontend:.*#ghcr.io/ramamishra7262/aks-copilot-frontend:${IMAGE_TAG}#" k8s/deployment.yaml

      - name: Deploy workloads
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl -n "${{ env.NAMESPACE }}" rollout status deployment/aks-copilot-backend --timeout=300s
          kubectl -n "${{ env.NAMESPACE }}" rollout status deployment/aks-copilot-frontend --timeout=300s

      - name: Smoke test
        run: |
          kubectl -n "${{ env.NAMESPACE }}" run smoke-test --rm -i --restart=Never --image=curlimages/curl -- \
            curl -sf http://aks-copilot-backend:8000/healthz
