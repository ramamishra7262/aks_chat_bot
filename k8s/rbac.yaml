# RBAC granted to the AKS Copilot backend so it can run diagnostic
# (read-only) and mutation (create/scale/delete) tools across the
# allowed namespaces. Scope this down further by replacing the
# ClusterRole with namespace-scoped Roles + RoleBindings if the bot
# should only ever touch a fixed set of namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aks-copilot-role
rules:
  # Diagnostic tools: pods, logs, events, services, nodes
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "nodes", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Mutation tools: create/update/delete/scale
  - apiGroups: [""]
    resources: ["pods", "services", "secrets", "configmaps"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aks-copilot-binding
subjects:
  - kind: ServiceAccount
    name: aks-copilot-sa
    namespace: aks-copilot
roleRef:
  kind: ClusterRole
  name: aks-copilot-role
  apiGroup: rbac.authorization.k8s.io
