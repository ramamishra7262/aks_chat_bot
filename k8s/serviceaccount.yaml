# ServiceAccount used by the AKS Copilot backend pod. Bound via Workload
# Identity to an Azure AD app registration that has been granted
# "Cognitive Services OpenAI User" on the Azure OpenAI account and
# "Search Index Data Reader" / "Search Service Contributor" on Azure AI
# Search (see infra/bicep/modules/role-assignments.bicep).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aks-copilot-sa
  namespace: aks-copilot
  annotations:
    azure.workload.identity/client-id: "<AZURE_WORKLOAD_IDENTITY_CLIENT_ID>"
  labels:
    azure.workload.identity/use: "true"
