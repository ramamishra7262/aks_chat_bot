apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-copilot-backend
  namespace: aks-copilot
  labels:
    app: aks-copilot-backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: aks-copilot-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aks-copilot-backend
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: aks-copilot-sa
      containers:
        - name: backend
          image: ghcr.io/ramamishra7262/aks-copilot-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: aks-copilot-config
            - secretRef:
                name: aks-copilot-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-copilot-frontend
  namespace: aks-copilot
  labels:
    app: aks-copilot-frontend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: aks-copilot-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aks-copilot-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ramamishra7262/aks-copilot-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
